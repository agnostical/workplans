<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workplans Progress</title>
  <link rel="stylesheet" href="vendor/tailwind.css">
  <link rel="stylesheet" href="css/styles.css">
  <script src="vendor/marked.min.js"></script>
  <script src="vendor/js-yaml.min.js"></script>
  <script src="js/app.js" defer></script>
</head>
<body class="bg-white dark:bg-black text-neutral-900 dark:text-neutral-100 min-h-screen transition-colors">

  <!-- Header -->
  <header class="bg-white dark:bg-black border-b border-neutral-200 dark:border-neutral-800 sticky top-0 z-10 relative">
    <span id="total-count" class="header-info header-info-center hidden"></span>
    <div class="max-w-screen-2xl mx-auto px-4 py-3 flex items-center justify-between relative">
      <div class="header-left flex items-center gap-3 min-w-0">
        <svg class="w-7 h-7 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/>
        </svg>
        <h1 class="header-left-title text-xl font-bold"><span id="header-title">Workplans</span> <span id="header-badge" class="text-xs font-semibold px-2 py-0.5 rounded-full bg-neutral-100 text-neutral-600 dark:bg-neutral-800 dark:text-neutral-400 border border-neutral-200 dark:border-neutral-700 align-middle">Progress</span> <span id="project-title-inline" class="header-info project-title-desktop pl-3 hidden"></span></h1>
      </div>
      <div class="flex items-center gap-3">
        <span id="live-indicator" class="hidden flex items-center gap-1.5 text-xs text-neutral-400 dark:text-neutral-600" title="Auto-refresh active">
          <span class="relative flex h-2 w-2">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
          </span>
          <span id="live-label">Live</span>
        </span>
        <button id="theme-toggle" class="p-2 rounded-lg hover:bg-neutral-100 dark:hover:bg-neutral-800 transition-colors" title="Toggle dark mode">
          <svg id="icon-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
          <svg id="icon-moon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </button>
      </div>
    </div>
    <div id="project-title-row" class="hidden border-t border-neutral-200 dark:border-neutral-800">
      <div class="max-w-screen-2xl mx-auto px-4 flex items-center justify-between">
        <span id="project-title" class="header-info text-xs"></span>
        <span id="total-count-mobile" class="header-info text-xs"></span>
      </div>
    </div>
  </header>

  <!-- Loading state -->
  <div id="loading" class="flex items-center justify-center" style="min-height: calc(100vh - 120px)">
    <div class="text-center">
      <div class="inline-block w-8 h-8 border-4 border-neutral-300 dark:border-neutral-700 border-t-neutral-800 dark:border-t-neutral-200 rounded-full animate-spin mb-4"></div>
      <p id="loading-text" class="text-neutral-500 dark:text-neutral-500">Loading plans...</p>
    </div>
  </div>

  <!-- Error state -->
  <div id="error" class="error-state hidden">
    <div class="error-content">
      <svg class="error-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/>
      </svg>
      <p id="error-msg" class="error-msg">To view plans in real time, run a local server from the workplans folder:</p>
      <code class="error-code" onclick="navigator.clipboard.writeText(this.dataset.clipboard||this.textContent).then(()=>{this.classList.add('copied');setTimeout(()=>this.classList.remove('copied'),1500)})">cd workplans && python3 -m http.server</code>
      <p class="error-open">Then open <a href="http://localhost:8000/progress/" target="_blank" rel="noopener">http://localhost:8000/progress/</a></p>
      <p class="error-hint">Or any other live server (VS Code Live Server, etc.)</p>
    </div>
  </div>

  <!-- Kanban Board -->
  <main id="board" class="hidden max-w-screen-2xl mx-auto p-4">
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4" style="min-height: calc(100vh - 120px)">

      <!-- Draft Column -->
      <section class="flex flex-col bg-neutral-50 dark:bg-neutral-900 rounded-lg border border-neutral-200 dark:border-neutral-800 overflow-hidden">
        <div class="flex items-center gap-2 px-4 py-3 border-b border-neutral-200 dark:border-neutral-800">
          <span class="w-3 h-3 rounded-full bg-draft"></span>
          <h2 id="heading-draft" class="font-semibold text-sm uppercase tracking-wide">Draft</h2>
          <button id="info-draft" onclick="openReadme('draft')" title="Column rules" class="text-neutral-400 hover:text-neutral-600 dark:hover:text-neutral-300 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </button>
          <span id="count-draft" class="ml-auto text-xs font-medium bg-neutral-200 dark:bg-neutral-800 text-neutral-600 dark:text-neutral-400 px-2 py-0.5 rounded-full">0</span>
        </div>
        <div id="col-draft" class="flex-1 p-3 space-y-3 overflow-y-auto max-h-[calc(100vh-180px)] scrollbar-thin">
        </div>
      </section>

      <!-- Backlog Column -->
      <section class="flex flex-col bg-neutral-50 dark:bg-neutral-900 rounded-lg border border-neutral-200 dark:border-neutral-800 overflow-hidden">
        <div class="flex items-center gap-2 px-4 py-3 border-b border-neutral-200 dark:border-neutral-800">
          <span class="w-3 h-3 rounded-full bg-backlog"></span>
          <h2 id="heading-backlog" class="font-semibold text-sm uppercase tracking-wide">Backlog</h2>
          <button id="info-backlog" onclick="openReadme('backlog')" title="Column rules" class="text-neutral-400 hover:text-neutral-600 dark:hover:text-neutral-300 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </button>
          <span id="count-backlog" class="ml-auto text-xs font-medium bg-neutral-200 dark:bg-neutral-800 text-neutral-600 dark:text-neutral-400 px-2 py-0.5 rounded-full">0</span>
        </div>
        <div id="col-backlog" class="flex-1 p-3 space-y-3 overflow-y-auto max-h-[calc(100vh-180px)] scrollbar-thin">
        </div>
      </section>

      <!-- Coding Column -->
      <section class="flex flex-col bg-neutral-50 dark:bg-neutral-900 rounded-lg border border-neutral-200 dark:border-neutral-800 overflow-hidden">
        <div class="flex items-center gap-2 px-4 py-3 border-b border-neutral-200 dark:border-neutral-800">
          <span class="w-3 h-3 rounded-full bg-coding"></span>
          <h2 id="heading-coding" class="font-semibold text-sm uppercase tracking-wide">Coding</h2>
          <button id="info-coding" onclick="openReadme('coding')" title="Column rules" class="text-neutral-400 hover:text-neutral-600 dark:hover:text-neutral-300 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </button>
          <span id="count-coding" class="ml-auto text-xs font-medium bg-neutral-200 dark:bg-neutral-800 text-neutral-600 dark:text-neutral-400 px-2 py-0.5 rounded-full">0</span>
        </div>
        <div id="col-coding" class="flex-1 p-3 space-y-3 overflow-y-auto max-h-[calc(100vh-180px)] scrollbar-thin">
        </div>
      </section>

      <!-- Done Column -->
      <section class="flex flex-col bg-neutral-50 dark:bg-neutral-900 rounded-lg border border-neutral-200 dark:border-neutral-800 overflow-hidden">
        <div class="flex items-center gap-2 px-4 py-3 border-b border-neutral-200 dark:border-neutral-800">
          <span class="w-3 h-3 rounded-full bg-done"></span>
          <h2 id="heading-done" class="font-semibold text-sm uppercase tracking-wide">Done</h2>
          <button id="info-done" onclick="openReadme('done')" title="Column rules" class="text-neutral-400 hover:text-neutral-600 dark:hover:text-neutral-300 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </button>
          <span id="count-done" class="ml-auto text-xs font-medium bg-neutral-200 dark:bg-neutral-800 text-neutral-600 dark:text-neutral-400 px-2 py-0.5 rounded-full">0</span>
        </div>
        <div id="col-done" class="flex-1 p-3 space-y-3 overflow-y-auto max-h-[calc(100vh-180px)] scrollbar-thin">
        </div>
      </section>

    </div>
  </main>

  <!-- Side Panel -->
  <div id="modal" class="hidden fixed inset-0 z-50">
    <div id="modal-backdrop" class="absolute inset-0 bg-black/50 backdrop-blur-sm transition-opacity duration-300 opacity-0"></div>
    <div id="panel" class="absolute top-0 right-0 h-full w-full max-w-2xl bg-white dark:bg-neutral-900 shadow-2xl border-l border-neutral-200 dark:border-neutral-800 flex flex-col translate-x-full transition-transform duration-300 ease-out">
      <!-- Panel Header -->
      <div id="modal-header" class="flex items-center gap-3 px-6 py-4 border-b border-neutral-200 dark:border-neutral-800">
        <span id="modal-state-dot" class="w-3 h-3 rounded-full"></span>
        <h2 id="modal-title" class="font-bold text-xl flex-1 truncate"></h2>
        <button id="modal-close" class="p-1.5 rounded-lg hover:bg-neutral-100 dark:hover:bg-neutral-800 transition-colors flex-shrink-0">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <!-- Panel Meta -->
      <div id="modal-meta" class="px-6 py-3 bg-neutral-50 dark:bg-neutral-900/50 border-b border-neutral-200 dark:border-neutral-800 flex flex-wrap items-center gap-3 text-sm text-neutral-500 dark:text-neutral-400">
      </div>
      <!-- Panel Authors -->
      <div id="modal-authors" class="hidden px-6 py-2 bg-neutral-50 dark:bg-neutral-900/50 border-b border-neutral-200 dark:border-neutral-800 flex flex-wrap items-center gap-4 text-sm text-neutral-500 dark:text-neutral-400">
      </div>
      <!-- Panel Body -->
      <div id="modal-body" class="flex-1 overflow-y-auto px-8 py-5 prose-plan scrollbar-thin">
      </div>
    </div>
  </div>

</body>
</html>
