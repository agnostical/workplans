<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workplans Progress</title>
  <link rel="stylesheet" href="vendor/tailwind.css">
  <link rel="stylesheet" href="css/styles.css">
  <script>
    // Apply theme before render to prevent flash
    (function() {
      var s = localStorage.getItem('workplans-theme');
      if (s === 'dark' || (!s && matchMedia('(prefers-color-scheme: dark)').matches))
        document.documentElement.classList.add('dark');
    })();
  </script>
  <script src="vendor/marked.min.js"></script>
  <script src="vendor/js-yaml.min.js"></script>
  <script src="js/app.js" defer></script>
  <script src="vendor/alpine.min.js" defer></script>
</head>
<body x-data="workplansBoard" class="bg-white dark:bg-black text-neutral-900 dark:text-neutral-100 min-h-screen transition-colors overflow-x-hidden">

  <!-- Header -->
  <header class="bg-white dark:bg-black border-b border-neutral-200 dark:border-neutral-800 sticky top-0 z-10 relative">
    <span x-show="appState === 'ready'" x-cloak class="header-info header-info-center" x-html="totalCountHtml()"></span>
    <div class="max-w-screen-2xl mx-auto px-4 py-3 flex items-center justify-between relative">
      <div class="header-left flex items-center gap-1.5 min-w-0">
        <svg class="w-7 h-7 shrink-0 text-neutral-400 dark:text-neutral-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/>
        </svg>
        <h1 class="header-left-title text-xl font-bold">
          <span x-text="t('headerTitle')">Workplans</span>
          <span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-neutral-100 text-neutral-600 dark:bg-neutral-800 dark:text-neutral-400 border border-neutral-200 dark:border-neutral-700 align-middle" x-text="t('headerBadge')">Progress</span>
          <span x-cloak class="header-info project-title-desktop pl-3" :class="{ 'visible': projectTitle }" x-text="projectTitle"></span>
        </h1>
      </div>
      <div class="flex items-center gap-3">
        <span x-show="appState === 'ready'" x-cloak class="flex items-center gap-1.5 text-xs text-neutral-400 dark:text-neutral-400" :title="t('autoRefresh')">
          <span class="relative flex h-2 w-2">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
          </span>
          <span x-text="t('live')">Live</span>
        </span>
        <button @click="toggleTheme()" class="p-2 rounded-lg hover:bg-neutral-100 dark:hover:bg-neutral-800 transition-colors" :title="t('toggleDark')">
          <svg id="icon-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
          <svg id="icon-moon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
          </svg>
        </button>
      </div>
    </div>
    <div x-show="projectTitle" x-cloak id="project-title-row" class="border-t border-neutral-200 dark:border-neutral-800">
      <div class="max-w-screen-2xl mx-auto px-4 flex items-center justify-between">
        <span class="header-info text-xs" x-text="projectTitle"></span>
        <span x-show="appState === 'ready'" class="header-info text-xs" x-html="totalCountHtml()"></span>
      </div>
    </div>
  </header>

  <!-- Loading state -->
  <div x-show="appState === 'loading'" class="flex items-center justify-center" style="min-height: calc(100vh - 120px)">
    <div class="text-center">
      <div class="inline-block w-8 h-8 border-4 border-neutral-300 dark:border-neutral-700 border-t-neutral-800 dark:border-t-neutral-200 rounded-full animate-spin mb-4"></div>
      <p class="text-neutral-500 dark:text-neutral-500" x-text="t('loading')">Loading plans...</p>
    </div>
  </div>

  <!-- Error state -->
  <div x-show="appState === 'error'" x-cloak class="error-state">
    <div class="error-content">
      <svg class="error-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17V7m0 10a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h2a2 2 0 012 2m0 10a2 2 0 002 2h2a2 2 0 002-2M9 7a2 2 0 012-2h2a2 2 0 012 2m0 10V7m0 10a2 2 0 002 2h2a2 2 0 002-2V7a2 2 0 00-2-2h-2a2 2 0 00-2 2"/>
      </svg>
      <p class="error-msg" x-text="t('errorMsg')">To view plans in real time, run a local server from the workplans folder:</p>
      <code class="error-code" onclick="navigator.clipboard.writeText(this.dataset.clipboard||this.textContent).then(()=>{this.classList.add('copied');setTimeout(()=>this.classList.remove('copied'),1500)})">cd workplans && python3 -m http.server</code>
      <p class="error-open">Then open <a href="http://localhost:8000/progress/" target="_blank" rel="noopener">http://localhost:8000/progress/</a></p>
      <p class="error-hint">Or any other live server (VS Code Live Server, etc.)</p>
    </div>
  </div>

  <!-- Kanban Board -->
  <main x-show="appState === 'ready'" x-cloak class="max-w-screen-2xl mx-auto p-4">
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4" style="min-height: calc(100vh - 120px)">

      <template x-for="state in states" :key="state">
        <section :data-state="state" class="flex flex-col bg-neutral-50 dark:bg-neutral-900 rounded-lg border border-neutral-200 dark:border-neutral-800">
          <!-- Column Header -->
          <div class="flex items-center gap-2 px-4 py-3 border-b border-neutral-200 dark:border-neutral-800">
            <span class="w-3 h-3 rounded-full" :class="stateColor(state)"></span>
            <h2 class="font-semibold text-xs uppercase tracking-wide" x-text="t(colKey(state))"></h2>
            <button x-show="showInfoButtons" @click="openReadme(state)" :title="t('columnRules')" class="text-neutral-400 hover:text-neutral-600 dark:hover:text-neutral-300 transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            </button>
            <span class="ml-auto text-xs font-medium bg-neutral-200 dark:bg-neutral-800 text-neutral-600 dark:text-neutral-400 px-2 py-0.5 rounded-full" x-text="plansForState(state).length">0</span>
          </div>
          <!-- Column Body -->
          <div class="flex-1 p-3 space-y-3 overflow-y-auto max-h-[calc(100vh-180px)] scrollbar-thin">

            <!-- Cards -->
            <template x-for="plan in plansForState(state)" :key="plan.file">
              <div @click="openModal(plan)"
                   :data-plan-file="plan.file"
                   class="card-animate group bg-white dark:bg-neutral-950 border border-neutral-200 dark:border-neutral-800 rounded-lg p-3 cursor-pointer hover:border-neutral-400 dark:hover:border-neutral-600 transition-all">
                <!-- Title + Progress -->
                <div class="flex items-start gap-2">
                  <span class="w-2.5 h-2.5 rounded-full flex-shrink-0 mt-1" :class="stateColor(plan.state)"></span>
                  <h3 class="font-medium text-sm leading-snug group-hover:text-neutral-600 dark:group-hover:text-white transition-colors flex-1" x-text="plan.title"></h3>
                  <template x-if="plan.progress">
                    <div class="flex items-center gap-1 ml-auto flex-shrink-0" :title="stepsLabel(plan.progress)">
                      <span class="text-xs font-medium text-neutral-500 dark:text-neutral-500" x-text="plan.progress.pct + '%'"></span>
                      <svg width="16" height="16" viewBox="0 0 16 16" class="flex-shrink-0">
                        <circle cx="8" cy="8" r="6" fill="none" stroke-width="2" class="stroke-neutral-200 dark:stroke-neutral-700"/>
                        <circle cx="8" cy="8" r="6" fill="none" stroke-width="2" stroke-linecap="round"
                          :stroke="plan.progress.pct === 100 ? '#22c55e' : '#a3a3a3'"
                          :stroke-dasharray="2 * Math.PI * 6"
                          :stroke-dashoffset="2 * Math.PI * 6 - (plan.progress.pct / 100) * 2 * Math.PI * 6"
                          transform="rotate(-90 8 8)" style="transition: stroke-dashoffset 0.4s ease"/>
                      </svg>
                    </div>
                  </template>
                </div>
                <!-- Date -->
                <div class="flex items-center gap-2 text-xs text-neutral-500 dark:text-neutral-500 mt-2 mb-2">
                  <template x-if="planDate(plan)">
                    <span class="flex items-center gap-1">
                      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                      <span x-text="planDate(plan)"></span>
                    </span>
                  </template>
                </div>
                <!-- Tags -->
                <template x-if="plan.tags">
                  <div class="flex flex-wrap gap-1">
                    <template x-for="tag in planTags(plan)" :key="tag">
                      <span class="inline-block text-xs px-2 py-0.5 rounded-full bg-neutral-100 dark:bg-neutral-800 text-neutral-600 dark:text-neutral-400" x-text="tag"></span>
                    </template>
                  </div>
                </template>
                <!-- Footer -->
                <template x-if="plan.author || hasModelIcons(plan.author_model)">
                  <div class="card-footer flex items-center justify-between gap-2 border-t border-neutral-100 dark:border-neutral-800">
                    <span x-show="plan.author" class="flex items-center gap-1 text-[10px] text-neutral-400 dark:text-neutral-600">
                      <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                      <span x-text="plan.author.split(',')[0].trim()"></span>
                    </span>
                    <span x-show="!plan.author"></span>
                    <span class="flex items-center gap-1" x-html="cardModelIconsHtml(plan.author_model)"></span>
                  </div>
                </template>
              </div>
            </template>

          </div>
        </section>
      </template>

    </div>
  </main>

  <!-- Side Panel -->
  <div class="fixed inset-0 z-50 pointer-events-none" :class="{ 'pointer-events-auto': modalOpen }" @keydown.escape.window="if (modalOpen) closeModal()">
    <!-- Backdrop -->
    <div x-show="modalOpen" x-cloak
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="absolute inset-0 bg-black/50 backdrop-blur-sm"
         @click="closeModal()"></div>
    <!-- Panel -->
    <div x-show="modalOpen" x-cloak
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="translate-x-full"
         x-transition:enter-end="translate-x-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="translate-x-0"
         x-transition:leave-end="translate-x-full"
         class="absolute top-0 right-0 h-full w-full max-w-2xl bg-white dark:bg-neutral-900 shadow-2xl border-l border-neutral-200 dark:border-neutral-800 flex flex-col">
      <!-- Panel Header -->
      <div class="flex items-center gap-3 px-6 py-4 border-b border-neutral-200 dark:border-neutral-800">
        <span class="w-3 h-3 rounded-full" :class="modalPlan ? stateColor(modalPlan.state) : ''"></span>
        <h2 class="font-bold text-xl flex-1 truncate" x-text="modalPlan ? modalPlan.title : ''"></h2>
        <button @click="closeModal()" class="p-1.5 rounded-lg hover:bg-neutral-100 dark:hover:bg-neutral-800 transition-colors flex-shrink-0">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <!-- Panel Meta -->
      <div class="px-6 py-3 bg-neutral-50 dark:bg-neutral-900/50 border-b border-neutral-200 dark:border-neutral-800 flex flex-wrap items-center gap-3 text-sm text-neutral-500 dark:text-neutral-400"
           x-html="modalMetaHtml()"></div>
      <!-- Panel Authors -->
      <div x-show="modalAuthorsHtml()"
           class="px-6 py-2 bg-neutral-50 dark:bg-neutral-900/50 border-b border-neutral-200 dark:border-neutral-800 flex flex-wrap items-center gap-4 text-sm text-neutral-500 dark:text-neutral-400"
           x-html="modalAuthorsHtml()"></div>
      <!-- Panel Body -->
      <div class="flex-1 overflow-y-auto px-8 py-5 prose-plan scrollbar-thin"
           x-html="modalBodyHtml()"
           x-effect="if (modalOpen && modalPlan) $nextTick(() => processComments($el))"></div>
    </div>
  </div>

</body>
</html>
